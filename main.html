<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Feedback Form</h2>

<form method="post">

    <label for="name">Name</label><br>
    <input
        type="text"
        id="name"
        minlength="3"
        maxlength="50"
        required
    ><br><br>

    <label for="portfolio">Portfolio</label><br>
    <input
        type="url"
        id="portfolio"
        required
    ><br><br>

    <label for="favColor">Favorite Color</label><br>
    <input
        type="color"
        id="favColor"
    ><br><br>

    <label for="likeness">Likeness</label><br>
    <input
        type="range"
        id="likeness"
        min="1"
        max="100"
    ><br><br>

    <button type="submit">Submit</button>

</form>

<script src="script.js"></script>

</body>
</html>
